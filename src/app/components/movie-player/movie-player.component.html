@if (safeEmbedUrl) {
  <div class="w-full">
    <iframe
      [src]="safeEmbedUrl"
      width="100%"
      class="block"
      style="aspect-ratio: 16 / 9;"
      allowfullscreen
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      referrerpolicy="origin"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups"
    ></iframe>
  </div>
} @else {
  <div class="flex items-center justify-center py-16 text-gray-400 dark:text-gray-500">
    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/></svg>
    <span class="text-sm">No video source available</span>
  </div>
}
