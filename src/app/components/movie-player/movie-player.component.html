@if (safeEmbedUrl) {
  <div class="w-full relative">
    <iframe
      [src]="safeEmbedUrl"
      class="block w-full"
      style="aspect-ratio: 16 / 9;"
      allow="autoplay; fullscreen *; encrypted-media"
      referrerpolicy="no-referrer"
    ></iframe>
    <div class="absolute top-2 right-2 flex gap-1.5 z-10">
      @for (player of players; track player.name; let i = $index) {
        <button
          (click)="switchPlayer(i)"
          class="px-2.5 py-1 text-[11px] font-medium rounded backdrop-blur-sm transition-colors"
          [class]="i === activePlayer
            ? 'bg-indigo-600/90 text-white'
            : 'bg-black/50 text-gray-300 hover:bg-black/70 hover:text-white'">
          {{ player.name }}
        </button>
      }
    </div>
  </div>
} @else {
  <div class="flex items-center justify-center py-16 text-gray-400 dark:text-gray-500">
    <svg class="w-6 h-6 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9a2.25 2.25 0 00-2.25-2.25h-9A2.25 2.25 0 002.25 7.5v9a2.25 2.25 0 002.25 2.25z"/></svg>
    <span class="text-sm">No video source available</span>
  </div>
}
