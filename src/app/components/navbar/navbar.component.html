<header class="flex flex-wrap sm:justify-start sm:flex-nowrap w-full text-sm py-3 md:py-4 transition-all duration-500"
  [ngClass]="transparent()
    ? (scrolled ? 'bg-black/40 backdrop-blur-lg' : 'bg-gradient-to-b from-black/80 via-black/40 to-transparent')
    : 'bg-white dark:bg-gray-800 shadow-sm'">
  <nav class="w-full mx-auto px-4 md:px-12 lg:px-16 flex flex-wrap basis-full items-center justify-between"
    aria-label="Global">
    <a class="sm:order-1 md:mb-0 flex-none text-xl font-bold tracking-tight" [routerLink]="['/']"
      [ngClass]="transparent() ? 'text-white' : 'text-gray-900 dark:text-white'">
      Stream Fiesta
    </a>
    <button type="button"
      class="sm:hidden md:mb-0 p-2.5 inline-flex justify-center items-center gap-x-2 rounded-lg border border-transparent hover:bg-white/10 transition-colors"
      [ngClass]="transparent() ? 'text-white' : 'text-gray-800 dark:text-white'"
      (click)="isOpenMenu = !isOpenMenu" aria-controls="navbar-alignment" aria-label="Toggle navigation">
      @if (!isOpenMenu) {
        <svg class="flex-shrink-0 size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" x2="21" y1="6" y2="6" />
          <line x1="3" x2="21" y1="12" y2="12" />
          <line x1="3" x2="21" y1="18" y2="18" />
        </svg>
      } @else {
        <svg class="flex-shrink-0 size-5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 6 6 18" />
          <path d="m6 6 12 12" />
        </svg>
      }
    </button>
    @if (showSearchBox()) {
      <app-search-box class="sm:order-3 w-full sm:w-auto"></app-search-box>
    }
    <div class="overflow-hidden transition-all duration-300 basis-full grow sm:grow-0 sm:basis-auto sm:block sm:order-2"
      [ngClass]="{hidden: !isOpenMenu}">
      <div class="flex flex-col gap-4 mt-4 sm:flex-row sm:items-center sm:mt-0 sm:ps-6">
        <a class="font-medium text-sm transition-colors"
          [ngClass]="currentPage === '/'
            ? (transparent() ? 'text-white font-semibold' : 'text-indigo-600 dark:text-indigo-400 font-semibold')
            : (transparent() ? 'text-gray-300 hover:text-white' : 'text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white')"
          [routerLink]="['/']">Home</a>
        <a class="font-medium text-sm transition-colors"
          [ngClass]="currentPage === '/about'
            ? (transparent() ? 'text-white font-semibold' : 'text-indigo-600 dark:text-indigo-400 font-semibold')
            : (transparent() ? 'text-gray-300 hover:text-white' : 'text-gray-600 hover:text-gray-900 dark:text-gray-400 dark:hover:text-white')"
          [routerLink]="['/about']">About</a>
      </div>
    </div>
  </nav>
</header>
