@if (visible) {
  <div class="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm animate-fade-in px-4"
    (click)="dismiss()">
    <div class="relative w-full max-w-md bg-gray-900 rounded-2xl shadow-2xl border border-gray-700/50 overflow-hidden animate-slide-up"
      (click)="$event.stopPropagation()">

      <!-- Header accent -->
      <div class="h-1 bg-gradient-to-r from-indigo-500 via-emerald-500 to-indigo-500"></div>

      <div class="p-6 sm:p-8">
        <!-- Shield icon -->
        <div class="flex justify-center mb-5">
          <div class="w-14 h-14 rounded-full bg-indigo-500/10 flex items-center justify-center">
            <svg class="w-7 h-7 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
            </svg>
          </div>
        </div>

        <h3 class="text-lg sm:text-xl font-bold text-white text-center mb-2">
          For a seamless experience
        </h3>

        <p class="text-sm text-gray-400 text-center mb-6 leading-relaxed">
          We recommend installing <span class="text-white font-medium">AdGuard</span> to block intrusive ads from video players and enjoy uninterrupted streaming.
        </p>

        <!-- CTA button -->
        <a [href]="link" target="_blank" rel="noopener noreferrer"
          (click)="dismiss()"
          class="flex items-center justify-center gap-2 w-full py-3 px-4 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-colors text-sm sm:text-base">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          @if (platform) {
            Get AdGuard for {{ platform }}
          } @else {
            Get AdGuard
          }
        </a>

        <!-- Dismiss -->
        <button (click)="dismiss()"
          class="w-full mt-3 py-2 text-sm text-gray-500 hover:text-gray-300 transition-colors text-center">
          No thanks, I already have an ad blocker
        </button>
      </div>
    </div>
  </div>
}
