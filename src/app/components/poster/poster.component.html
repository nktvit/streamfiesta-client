<div
  [routerLink]="['/movie', movie().imdbID || movie().tmdbId]"
  [queryParams]="movie().mediaType === 'tv' ? {type: 'tv'} : {}"
  class="poster-container group select-none cursor-pointer transition-transform duration-300 ease-in-out hover:scale-105 min-w-16"
  tabindex="0"
  [attr.aria-label]="'View details for ' + movie().Title">

  <div class="poster-content relative w-full h-full bg-gray-800 rounded-lg">
    @if (loading) {
      <div class="absolute inset-0 rounded-lg bg-gray-800 animate-pulse"></div>
    }
    @if (imageUrl) {
      <img
        [ngSrc]="imageUrl"
        [alt]="movie().Title || 'Movie Poster'"
        fill
        [priority]="priority()"
        sizes="(max-width: 768px) 100vw, (max-width: 1200px) 50vw, 33vw"
        (load)="onImageLoad()"
        (error)="onImageError()"
        class="rounded-lg object-cover group-hover:opacity-90 transition-opacity duration-200"
        >
    } @else if (!loading) {
      <div class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br from-gray-700 to-gray-800 rounded-lg p-3">
        <svg class="w-8 h-8 text-gray-500 mb-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"/>
        </svg>
        <span class="text-gray-400 text-[10px] font-medium text-center leading-tight line-clamp-3">{{ movie().Title }}</span>
      </div>
    }

    @if (displayTitle()) {
      <div
        class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black to-transparent p-4 rounded-lg opacity-0 group-hover:opacity-100 transition-opacity duration-300 ease-in-out">
        <span class="text-white text-xs sm:text-base lg:text-md font-semibold line-clamp-3">{{ movie().Title }}</span>
      </div>
    }
  </div>
</div>
